name: Build Extension

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: npm install

      - name: Build extension
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: PotatoBlocking-build
          path: dist/
