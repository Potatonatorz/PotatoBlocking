```yaml
name: uBO Lite beta

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          submodules: recursive

      - name: Locate uBO repo
        run: echo "UBLOCK_REPO_DIR=$GITHUB_WORKSPACE/uBlock" >> "$GITHUB_ENV"

      - name: Create unique time-based version
        run: |
          TAGNAME=$(date -u "+%Y").$(date -u "+%-m*100+%-d" | bc).$(date -u "+%H*100+%M" | bc)
          echo "TAGNAME=$TAGNAME" >> "$GITHUB_ENV"

      - name: Build Chromium uBOLite beta
        run: |
          cd "$UBLOCK_REPO_DIR"
          tools/make-mv3.sh chromium "$TAGNAME"

      - name: Upload Chromium artifact
        uses: actions/upload-artifact@v4
        with:
          name: uBOLite-beta-chromium
          path: uBlock/dist/build/uBOLite_*.chromium.zip
          if-no-files-found: error
```
