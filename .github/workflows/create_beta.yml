name: uBO Lite beta

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          submodules: recursive

      - name: Locate uBO repo
        run: echo "UBLOCK_REPO_DIR=$GITHUB_WORKSPACE/uBlock" >> "$GITHUB_ENV"

      - name: Create unique time-based version
        run: |
          TAGNAME=$(date -u "+%Y").$(date -u "+%-m*100+%-d" | bc).$(date -u "+%H*100+%M" | bc)
          echo "TAGNAME=$TAGNAME" >> "$GITHUB_ENV"

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Chromium PotatoBlocking beta
        run: |
          cd "$UBLOCK_REPO_DIR"
          tools/make-mv3.sh chromium "$TAGNAME"

          cd "$UBLOCK_REPO_DIR/dist/build"
          rm -rf chromium-temp
          unzip -q "PotatoBlocking_${TAGNAME}.chromium.zip" -d chromium-temp

          python3 - <<'PY'
          import json

          path = "chromium-temp/manifest.json"

          with open(path, "r", encoding="utf-8") as f:
              manifest = json.load(f)

          manifest["name"] = "PotatoBlocking"
          manifest["short_name"] = "PotatoBlocking"
          manifest["description"] = "PotatoBlocking"

          permissions = set(manifest.get("permissions", []))
          permissions.add("alarms")
          permissions.add("storage")
          manifest["permissions"] = sorted(permissions)

          with open(path, "w", encoding="utf-8") as f:
              json.dump(manifest, f, indent=2)
          PY

          python3 - <<'PY'
          import json
          import os

          path = "chromium-temp/_locales/en/messages.json"

          if os.path.exists(path):
              with open(path, "r", encoding="utf-8") as f:
                  messages = json.load(f)

              if "extName" in messages:
                  messages["extName"]["message"] = "PotatoBlocking"
              if "extShortDesc" in messages:
                  messages["extShortDesc"]["message"] = "PotatoBlocking"

              with open(path, "w", encoding="utf-8") as f:
                  json.dump(messages, f, indent=2, ensure_ascii=False)
          PY

          perl -0pi -e 's/\nconst POTATO_POLICY_URL = "https:\/\/potatonatorz\.github\.io\/PotatoBlock\/policy\.json";.*//s' chromium-temp/js/background.js

          {
            echo ''
            echo 'const POTATO_POLICY_URL = "https://potatonatorz.github.io/PotatoBlock/policy.json";'
            echo 'const POTATO_RULE_ID = 2000000000;'
            echo 'const POTATO_STORAGE_KEY = "potatoAllowedDomains";'
            echo 'let potatoSyncRunning = false;'
            echo ''
            echo 'function normalizePotatoHost(site) {'
            echo '  return String(site || "")'
            echo '    .trim()'
            echo '    .toLowerCase()'
            echo '    .replace(/^https?:\/\//, "")'
            echo '    .replace(/\/.*$/, "")'
            echo '    .replace(/^www\./, "");'
            echo '}'
            echo ''
            echo 'async function updatePotatoRemoteAllowlist() {'
            echo '  if (potatoSyncRunning) { return; }'
            echo '  potatoSyncRunning = true;'
            echo ''
            echo '  try {'
            echo '    const response = await fetch(POTATO_POLICY_URL, { cache: "no-store" });'
            echo '    const policy = await response.json();'
            echo ''
            echo '    const domains = new Set();'
            echo '    for (const site of policy.allowedSites || []) {'
            echo '      const hostname = normalizePotatoHost(site);'
            echo '      if (!hostname) { continue; }'
            echo '      domains.add(hostname);'
            echo '      domains.add("www." + hostname);'
            echo '    }'
            echo ''
            echo '    const stored = await chrome.storage.local.get(POTATO_STORAGE_KEY);'
            echo '    const previousDomains = new Set(stored[POTATO_STORAGE_KEY] || []);'
            echo ''
            echo '    for (const oldDomain of previousDomains) {'
            echo '      if (!domains.has(oldDomain)) {'
            echo '        await setFilteringMode(oldDomain, 3);'
            echo '      }'
            echo '    }'
            echo ''
            echo '    for (const site of domains) {'
            echo '      await setFilteringMode(site, 0);'
            echo '    }'
            echo ''
            echo '    await chrome.storage.local.set({ [POTATO_STORAGE_KEY]: Array.from(domains) });'
            echo '    await registerDeclarativeAssets();'
            echo ''
            echo '    const ruleIdsToRemove = [POTATO_RULE_ID, 800000];'
            echo '    for (let id = 910000; id < 911000; id++) {'
            echo '      ruleIdsToRemove.push(id);'
            echo '    }'
            echo ''
            echo '    const addRules = domains.size === 0 ? [] : [{'
            echo '      id: POTATO_RULE_ID,'
            echo '      priority: 2000000,'
            echo '      action: { type: "allowAllRequests" },'
            echo '      condition: {'
            echo '        requestDomains: Array.from(domains),'
            echo '        resourceTypes: ["main_frame", "sub_frame"]'
            echo '      }'
            echo '    }];'
            echo ''
            echo '    await chrome.declarativeNetRequest.updateDynamicRules({'
            echo '      removeRuleIds: ruleIdsToRemove,'
            echo '      addRules'
            echo '    });'
            echo ''
            echo '    console.log("[PotatoBlocking] Remote allowlist synced:", Array.from(domains));'
            echo '  } catch (error) {'
            echo '    console.error("[PotatoBlocking] Remote allowlist failed:", error);'
            echo '  } finally {'
            echo '    potatoSyncRunning = false;'
            echo '  }'
            echo '}'
            echo ''
            echo 'updatePotatoRemoteAllowlist();'
            echo 'chrome.runtime.onStartup.addListener(updatePotatoRemoteAllowlist);'
            echo 'chrome.runtime.onInstalled.addListener(updatePotatoRemoteAllowlist);'
            echo 'chrome.alarms.create("potatoAllowlistSync", { periodInMinutes: 5 });'
            echo 'chrome.alarms.onAlarm.addListener(alarm => {'
            echo '  if (alarm.name === "potatoAllowlistSync") {'
            echo '    updatePotatoRemoteAllowlist();'
            echo '  }'
            echo '});'
          } >> chromium-temp/js/background.js

          cat > chromium-temp/js/potato-lockdown.js <<'EOF'
          (() => {
            const blockedTexts = [
              "Remove an element",
              "Create a custom filter",
              "Report an issue",
              "Settings",
              "Default filtering mode",
              "Behavior",
              "Backup",
              "Filter lists",
              "Custom filters",
              "About",
              "Import / Export",
              "Import",
              "Export",
              "..."
            ];

            function injectLockdownCss() {
              const css = `
                input[type="range"],
                [role="slider"],
                .slider,
                .sliderbar,
                .slider-bar,
                .filtering-mode-slider,
                #filteringModeSlider,
                #filteringModeSliderContainer,
                [data-i18n="popupTipDashboard"],
                a[href*="dashboard"],
                button[href*="dashboard"],
                .fa-icon.cog,
                .icon-cog,
                .icon-gear,
                .gear,
                .cog,
                [title*="Settings"],
                [title*="settings"],
                [aria-label*="Settings"],
                [aria-label*="settings"] {
                  display: none !important;
                  visibility: hidden !important;
                  pointer-events: none !important;
                }
              `;

              let style = document.getElementById("potato-lockdown-css");
              if (!style) {
                style = document.createElement("style");
                style.id = "potato-lockdown-css";
                document.documentElement.appendChild(style);
              }
              style.textContent = css;
            }

            function hideBlockedText() {
              for (const el of document.querySelectorAll("a, button, div, span, section, h1, h2, h3, label, summary, details")) {
                const text = (el.textContent || "").trim();
                if (blockedTexts.some(t => text === t || text.includes(t))) {
                  const row = el.closest("li, section, details, div, label, p, a, button") || el;
                  row.style.display = "none";
                  row.style.pointerEvents = "none";
                }
              }
            }

            function hidePopupControls() {
              for (const el of document.querySelectorAll("input[type='range'], [role='slider'], svg, button, a, span, div")) {
                const text = [
                  el.textContent || "",
                  el.title || "",
                  el.getAttribute("aria-label") || "",
                  el.getAttribute("href") || "",
                  typeof el.className === "string" ? el.className : "",
                  el.id || ""
                ].join(" ").toLowerCase();

                if (
                  el.matches("input[type='range'], [role='slider']") ||
                  text.includes("setting") ||
                  text.includes("dashboard") ||
                  text.includes("gear") ||
                  text.includes("cog")
                ) {
                  const row = el.closest("li, section, details, div, label, p, a, button") || el;
                  row.style.display = "none";
                  row.style.pointerEvents = "none";
                }
              }
            }

            function lockControls() {
              for (const input of document.querySelectorAll("input, select, textarea, button, a")) {
                input.disabled = true;
                input.style.pointerEvents = "none";
              }
            }

            function blockPages() {
              if (location.href.includes("dashboard.html")) {
                document.body.innerHTML =
                  '<div style="padding:20px;font-family:sans-serif">Settings disabled by PotatoBlocking</div>';
              }
            }

            function run() {
              injectLockdownCss();
              blockPages();
              hideBlockedText();
              hidePopupControls();
              lockControls();
            }

            run();

            new MutationObserver(run).observe(document.documentElement, {
              childList: true,
              subtree: true
            });
          })();
          EOF

          for file in chromium-temp/*.html; do
            sed -i 's#</body>#<script src="/js/potato-lockdown.js"></script></body>#' "$file"
          done

          cd chromium-temp
          zip -qr "../PotatoBlocking.beta.chromium.zip" .

      - name: Upload Chromium artifact
        uses: actions/upload-artifact@v4
        with:
          name: PotatoBlocking-beta-chromium
          path: uBlock/dist/build/PotatoBlocking.beta.chromium.zip
          if-no-files-found: error
