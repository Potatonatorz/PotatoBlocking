name: uBO Lite beta

on: workflow_dispatch

permissions:
  contents: read

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          submodules: recursive

      - name: Locate uBO repo
        run: echo "UBLOCK_REPO_DIR=$GITHUB_WORKSPACE/uBlock" >> "$GITHUB_ENV"

      - name: Create unique time-based version
        run: |
          TAGNAME=$(date -u "+%Y").$(date -u "+%-m*100+%-d" | bc).$(date -u "+%H*100+%M" | bc)
          echo "TAGNAME=$TAGNAME" >> "$GITHUB_ENV"

      - name: Build Chromium uBOLite beta
        run: |
          cd "$UBLOCK_REPO_DIR"
          tools/make-mv3.sh chromium "$TAGNAME"

          cd "$UBLOCK_REPO_DIR/dist/build"
          rm -rf chromium-temp
          unzip -q "uBOLite_${TAGNAME}.chromium.zip" -d chromium-temp

          cat >> chromium-temp/js/background.js <<'EOF'

          const POTATO_POLICY_URL = "https://potatonatorz.github.io/PotatoBlock/policy.json";

          async function updatePotatoRemoteAllowlist() {
            try {
              const response = await fetch(POTATO_POLICY_URL, { cache: "no-store" });
              const policy = await response.json();
              const allowedSites = Array.isArray(policy.allowedSites) ? policy.allowedSites : [];

              const domains = [...new Set(
                allowedSites
                  .filter(site => typeof site === "string" && site.trim() !== "")
                  .map(site => site.trim().toLowerCase())
                  .map(site => site.replace(/^https?:\/\//, ""))
                  .map(site => site.replace(/\/.*$/, ""))
                  .map(site => site.replace(/^www\./, ""))
                  .filter(Boolean)
              )];

              const rules = domains.slice(0, 1000).map((hostname, index) => ({
                id: 910000 + index,
                priority: 1000000,
                action: { type: "allowAllRequests" },
                condition: {
                  requestDomains: [hostname, "www." + hostname],
                  resourceTypes: ["main_frame", "sub_frame"]
                  }
              }));

              const oldRules = await chrome.declarativeNetRequest.getDynamicRules();
              const oldPotatoRuleIds = oldRules
                .filter(rule => rule.id >= 900000 && rule.id < 911000)
                .map(rule => rule.id);

              await chrome.declarativeNetRequest.updateDynamicRules({
                removeRuleIds: oldPotatoRuleIds,
                addRules: rules
              });

              console.log("[PotatoBlocking] DNR RULES CREATED:", rules);
            } catch (error) {
              console.error("[PotatoBlocking] DNR RULES FAILED:", error);
            }
          }

          updatePotatoRemoteAllowlist();
          chrome.runtime.onInstalled.addListener(updatePotatoRemoteAllowlist);
          chrome.runtime.onStartup.addListener(updatePotatoRemoteAllowlist);
          EOF

          grep -R "DNR RULES CREATED" chromium-temp/js/background.js

          cd chromium-temp
          zip -qr "../uBOLite.beta.chromium.zip" .

      - name: Upload Chromium artifact
        uses: actions/upload-artifact@v4
        with:
          name: uBOLite-beta-chromium
          path: uBlock/dist/build/uBOLite.beta.chromium.zip
          if-no-files-found: error
