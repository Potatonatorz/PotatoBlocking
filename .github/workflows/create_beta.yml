name: uBO Lite beta

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          submodules: recursive

      - name: Locate uBO repo
        run: |
          echo "UBLOCK_REPO_DIR=$GITHUB_WORKSPACE/uBlock" >> "$GITHUB_ENV"

      - name: Create unique time-based version
        run: |
          TAGNAME=$(date -u "+%Y").$(date -u "+%-m*100+%-d" | bc).$(date -u "+%H*100+%M" | bc)
          echo "TAGNAME=$TAGNAME" >> "$GITHUB_ENV"
          echo "Version: $TAGNAME"

      - name: Build Chromium uBOLite beta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd "$UBLOCK_REPO_DIR"
          tools/make-mv3.sh chromium "$TAGNAME"

          mv "$UBLOCK_REPO_DIR/dist/build/uBOLite_${TAGNAME}.chromium.zip" \
             "$UBLOCK_REPO_DIR/dist/build/uBOLite.beta.chromium.zip"

          ls -lah "$UBLOCK_REPO_DIR/dist/build/"

      - name: Upload Chromium artifact
        uses: actions/upload-artifact@v4
        with:
          name: uBOLite-beta-chromium
          path: uBlock/dist/build/uBOLite.beta.chromium.zip
          if-no-files-found: error
