name: uBO Lite beta

on: workflow_dispatch

permissions:
  contents: read

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          submodules: recursive

      - name: Locate uBO repo
        run: echo "UBLOCK_REPO_DIR=$GITHUB_WORKSPACE/uBlock" >> "$GITHUB_ENV"

      - name: Create unique time-based version
        run: |
          TAGNAME=$(date -u "+%Y").$(date -u "+%-m*100+%-d" | bc).$(date -u "+%H*100+%M" | bc)
          echo "TAGNAME=$TAGNAME" >> "$GITHUB_ENV"

      - name: Build Chromium uBOLite beta
        run: |
          cd "$UBLOCK_REPO_DIR"
          tools/make-mv3.sh chromium "$TAGNAME"

          cd "$UBLOCK_REPO_DIR/dist/build"
          rm -rf chromium-temp
          unzip -q "uBOLite_${TAGNAME}.chromium.zip" -d chromium-temp

          {
            echo ''
            echo 'const POTATO_POLICY_URL = "https://potatonatorz.github.io/PotatoBlock/policy.json";'
            echo ''
            echo 'async function updatePotatoRemoteAllowlist() {'
            echo '  try {'
            echo '    const response = await fetch(POTATO_POLICY_URL, { cache: "no-store" });'
            echo '    const policy = await response.json();'
            echo '    const noFiltering = {};'
            echo ''
            echo '    for (const site of policy.allowedSites || []) {'
            echo '      if (typeof site === "string" && site.trim() !== "") {'
            echo '        noFiltering[site.trim()] = true;'
            echo '      }'
            echo '    }'
            echo ''
            echo '    for (const site of Object.keys(noFiltering)) {'
            echo '      await setFilteringMode(site, 0);'
            echo '    }'
            echo ''
            echo '    await registerDeclarativeAssets();'
            echo '    console.log("[PotatoBlocking] Remote allowlist applied:", noFiltering);'
            echo '  } catch (error) {'
            echo '    console.error("[PotatoBlocking] Remote allowlist failed:", error);'
            echo '  }'
            echo '}'
            echo ''
            echo 'updatePotatoRemoteAllowlist();'
            echo 'chrome.runtime.onInstalled.addListener(updatePotatoRemoteAllowlist);'
            echo 'chrome.runtime.onStartup.addListener(updatePotatoRemoteAllowlist);'
          } >> chromium-temp/js/background.js

          grep -R "POTATO_POLICY_URL" chromium-temp/js/background.js

          cd chromium-temp
          zip -qr "../uBOLite.beta.chromium.zip" .

      - name: Upload Chromium artifact
        uses: actions/upload-artifact@v4
        with:
          name: uBOLite-beta-chromium
          path: uBlock/dist/build/uBOLite.beta.chromium.zip
          if-no-files-found: error
